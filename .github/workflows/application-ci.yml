name: Application CI

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "ai-service/**"
      - ".github/workflows/application-ci.yml"
      - ".github/actions/**"

  pull_request:
    branches:
      - develop
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "ai-service/**"
      - ".github/workflows/application-ci.yml"
      - ".github/actions/**"

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Environment
    runs-on: self-hosted

    outputs:
      env_name: ${{ steps.set_vars.outputs.env_name }}
      image_tag: ${{ steps.set_vars.outputs.image_tag }}

    steps:
      - name: Set environment and image tag
        id: set_vars
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "env_name=pr" >> "$GITHUB_OUTPUT"
            echo "image_tag=pr-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "env_name=prod" >> "$GITHUB_OUTPUT"
            echo "image_tag=prod-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=dev" >> "$GITHUB_OUTPUT"
            echo "image_tag=dev-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build Applications
    runs-on: self-hosted
    needs: prepare

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache NPM packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Build backend
        run: |
          cd backend
          mvn -B -ntp clean package -DskipTests

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Compile AI service
        run: |
          python3 -m compileall ai-service

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            backend/target/*.jar
            backend/target/classes/
          if-no-files-found: error

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error

  test:
    name: Run Unit Tests
    runs-on: self-hosted
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache NPM packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Test backend
        run: |
          cd backend
          mvn -B -ntp test

      - name: Test frontend
        run: |
          cd frontend
          npm ci
          npm test

      - name: Test AI service
        run: |
          cd ai-service
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest
          deactivate

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

  sonarqube:
    name: SonarCloud Code Quality Analysis
    runs-on: self-hosted
    needs: test
    if: github.ref_name == 'main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/target/

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=rajeevsingh05_cloudpulse-ai-app
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=backend/src,frontend/src,ai-service
            -Dsonar.java.binaries=backend/target/classes
            -Dsonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/venv/**,**/__pycache__/**
            -Dsonar.qualitygate.wait=true