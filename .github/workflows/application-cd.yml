name: Application CD

on:
  workflow_run:
    workflows:
      - Application CI
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  docker:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    name: Build and Push Docker Images
    runs-on: self-hosted

    outputs:
      env_name: ${{ steps.vars.outputs.env_name }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    env:
      ACR_NAME: ${{ vars.ACR_NAME }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Calculate deployment variables
        id: vars
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
            echo "image_tag=prod-${{ github.event.workflow_run.run_number }}" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
            echo "image_tag=dev-${{ github.event.workflow_run.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Azure login and ACR login
        uses: ./.github/actions/azure-login
        with:
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          acr-name: ${{ vars.ACR_NAME }}

      - name: Build Docker images
        run: |
          docker build \
            -t "$ACR_LOGIN_SERVER/cloudpulse-backend:${{ steps.vars.outputs.image_tag }}" \
            -t "$ACR_LOGIN_SERVER/cloudpulse-backend:${{ steps.vars.outputs.env_name }}" \
            ./backend

          docker build \
            -t "$ACR_LOGIN_SERVER/cloudpulse-frontend:${{ steps.vars.outputs.image_tag }}" \
            -t "$ACR_LOGIN_SERVER/cloudpulse-frontend:${{ steps.vars.outputs.env_name }}" \
            ./frontend

          docker build \
            -t "$ACR_LOGIN_SERVER/cloudpulse-ai-service:${{ steps.vars.outputs.image_tag }}" \
            -t "$ACR_LOGIN_SERVER/cloudpulse-ai-service:${{ steps.vars.outputs.env_name }}" \
            ./ai-service

      - name: Push Docker images
        run: |
          docker push "$ACR_LOGIN_SERVER/cloudpulse-backend:${{ steps.vars.outputs.image_tag }}"
          docker push "$ACR_LOGIN_SERVER/cloudpulse-backend:${{ steps.vars.outputs.env_name }}"

          docker push "$ACR_LOGIN_SERVER/cloudpulse-frontend:${{ steps.vars.outputs.image_tag }}"
          docker push "$ACR_LOGIN_SERVER/cloudpulse-frontend:${{ steps.vars.outputs.env_name }}"

          docker push "$ACR_LOGIN_SERVER/cloudpulse-ai-service:${{ steps.vars.outputs.image_tag }}"
          docker push "$ACR_LOGIN_SERVER/cloudpulse-ai-service:${{ steps.vars.outputs.env_name }}"