name: Build Test and Push Images

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "ai-service/**"
      - ".github/workflows/build-push-images.yml"

  pull_request:
    branches:
      - develop
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "ai-service/**"
      - ".github/workflows/build-push-images.yml"

jobs:
  build-test-and-push:
    name: Build Test Dockerize and Push
    runs-on: self-hosted

    env:
      ACR_NAME: ${{ vars.ACR_NAME }}

    steps:
      # Stage 1: Checkout source code from repository
      - name: Checkout source code
        uses: actions/checkout@v4

      # Stage 2: Decide target environment based on branch
      - name: Set environment and image tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "ENV_NAME=pr" >> $GITHUB_ENV
            echo "IMAGE_TAG=pr-${GITHUB_SHA}" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "IMAGE_TAG=prod-${GITHUB_SHA}" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "IMAGE_TAG=dev-${GITHUB_SHA}" >> $GITHUB_ENV
          fi

      # Stage 3: Build backend, frontend and AI service
      - name: Build applications
        run: |
          cd backend
          mvn clean package -DskipTests
          cd ..

          cd frontend
          npm ci
          npm run build
          cd ..

          python3 -m compileall ai-service

      # Stage 4: Run unit tests for all microservices
      - name: Run unit tests
        run: |
          cd backend
          mvn test
          cd ..

          cd frontend
          npm test
          cd ..

          cd ai-service
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest
          deactivate
          cd ..

      # Stage 5: Login to Azure and ACR only for push events
      - name: Azure login and ACR login
        if: github.event_name == 'push'
        run: |
          az login --identity
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV
          az acr login --name "$ACR_NAME"

      # Stage 6: Build Docker images
      - name: Build Docker images
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            docker build \
              -t $ACR_LOGIN_SERVER/cloudpulse-backend:$IMAGE_TAG \
              -t $ACR_LOGIN_SERVER/cloudpulse-backend:$ENV_NAME \
              ./backend

            docker build \
              -t $ACR_LOGIN_SERVER/cloudpulse-frontend:$IMAGE_TAG \
              -t $ACR_LOGIN_SERVER/cloudpulse-frontend:$ENV_NAME \
              ./frontend

            docker build \
              -t $ACR_LOGIN_SERVER/cloudpulse-ai-service:$IMAGE_TAG \
              -t $ACR_LOGIN_SERVER/cloudpulse-ai-service:$ENV_NAME \
              ./ai-service
          else
            docker build -t cloudpulse-backend:$IMAGE_TAG ./backend
            docker build -t cloudpulse-frontend:$IMAGE_TAG ./frontend
            docker build -t cloudpulse-ai-service:$IMAGE_TAG ./ai-service
          fi

      # Stage 7: Push Docker images to ACR only after code is pushed to develop or main
      - name: Push Docker images to ACR
        if: github.event_name == 'push'
        run: |
          docker push $ACR_LOGIN_SERVER/cloudpulse-backend:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/cloudpulse-backend:$ENV_NAME

          docker push $ACR_LOGIN_SERVER/cloudpulse-frontend:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/cloudpulse-frontend:$ENV_NAME

          docker push $ACR_LOGIN_SERVER/cloudpulse-ai-service:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/cloudpulse-ai-service:$ENV_NAME

      # Stage 8: Verify pushed images in ACR
      - name: Verify ACR repositories
        if: github.event_name == 'push'
        run: |
          az acr repository list --name "$ACR_NAME" -o table

      # Stage 9: Clean Docker cache from self-hosted runner to save disk space
      - name: Cleanup Docker cache
        if: always()
        run: |
          docker image prune -af
          docker builder prune -af