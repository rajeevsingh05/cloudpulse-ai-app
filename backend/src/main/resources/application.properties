server.port=9090
spring.application.name=cloudpulse-backend

ai.service.url=${AI_SERVICE_URL:http://cloudpulse-ai-service:8000}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=cloudpulse-backend